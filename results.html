<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Results</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.18);
      --text-primary: #1a1a18;
      --text-secondary: #6b6b66;
      --text-tertiary: #9e9e99;
      --text-link: #1a6ed8;
      --bg-info: #e8f1fc;
      --text-info: #1a6ed8;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    .header {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      margin-bottom: 20px;
    }

    .meta-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }

    .original-query {
      font-size: 17px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 14px;
    }

    .lang-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .lang-pill {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-info);
      background: var(--bg-info);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .section {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      margin-bottom: 12px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .flag { font-size: 18px; line-height: 1; }

    .region-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .localized-query {
      font-size: 12px;
      color: var(--text-secondary);
      background: #f7f7f5;
      border-left: 2px solid var(--border-strong);
      padding: 6px 10px;
      border-radius: 0 4px 4px 0;
      margin-bottom: 12px;
    }

    .localized-query .qlabel {
      color: var(--text-tertiary);
      margin-right: 4px;
    }

    .results-list { list-style: none; }

    .result-item {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      border-top: 0.5px solid var(--border);
    }

    .result-item:first-child { border-top: none; }

    .result-num {
      font-size: 12px;
      color: var(--text-tertiary);
      min-width: 16px;
      padding-top: 1px;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .result-content { flex: 1; min-width: 0; }

    .result-title {
      font-size: 14px;
      color: var(--text-link);
      text-decoration: none;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-title:hover { text-decoration: underline; }

    .result-url {
      font-size: 11px;
      color: var(--text-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      margin-top: 2px;
    }

    .error-state {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 20px;
      text-align: center;
      color: var(--text-secondary);
    }

    .error-state p { margin-bottom: 6px; font-size: 14px; }
    .error-state p:last-child { margin-bottom: 0; font-size: 12px; color: var(--text-tertiary); }

    /* Skeleton loader */
    @keyframes shimmer {
      0%   { opacity: 0.4; }
      50%  { opacity: 0.9; }
      100% { opacity: 0.4; }
    }

    .skeleton-wrap { padding: 2px 0; }

    .skeleton-item {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      border-top: 0.5px solid var(--border);
    }

    .skeleton-item:first-child { border-top: none; }

    .skel {
      background: var(--border-strong);
      border-radius: 4px;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    .skel-num  { width: 14px; height: 14px; flex-shrink: 0; margin-top: 2px; }
    .skel-content { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .skel-title { height: 14px; width: 80%; }
    .skel-url   { height: 11px; width: 45%; }

    /* Inline per-section error */
    .inline-error {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 13px;
      color: #a32d2d;
      background: #fcebeb;
      border: 0.5px solid #f09595;
      border-radius: var(--radius-md);
      padding: 8px 12px;
    }

  </style>
</head>
<body>
  <div class="page">

    <div class="header">
      <div class="meta-label">Original query</div>
      <div class="original-query" id="originalQuery">Loading…</div>
      <div class="meta-label" style="margin-top: 10px; margin-bottom: 6px;">Languages selected</div>
      <div class="lang-pills" id="langPills"></div>
    </div>

    <div id="sectionsContainer"></div>

  </div>

  <script src="results.js"></script>
</body>
</html>
